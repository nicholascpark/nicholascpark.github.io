about:
  - >
    I build intelligent systems and study how they learn. My work sits at the intersection of software engineering, reinforcement learning, and multi-agent AI — a path that started in electrical engineering and actuarial mathematics, moved through machine learning research at Georgia Tech, and now focuses on designing agentic AI solutions that operate in complex, adversarial environments. Nine years of production systems across fintech, insurance, and hardware taught me that rigorous thinking and practical building are the same pursuit.
  - >
    What draws me most is adversarial insight — how competing pressures between agents sharpen intelligence. Whether it's multi-agent coordination, entity resolution at enterprise scale, or voice agents navigating real conversations, the interesting problems live where systems have to adapt under constraint. I run Zealot Analytics to bring this work to organizations ready for it, and I write about the deeper questions that keep pulling me forward: how learning actually works, and what it means to build systems that do it well.
