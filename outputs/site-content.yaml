about:
  - >
    I build intelligent systems and study how they learn. Over nine years across fintech, insurance, and hardware, I've moved from electrical engineering to actuarial modeling to machine learning to designing AI agents — each step driven by the same question: how do systems, artificial or otherwise, get better at deciding under uncertainty. My graduate work at Georgia Tech sharpened that inquiry into reinforcement learning and multi-agent AI, where I found that the most interesting intelligence emerges not from isolated optimization but from competing pressures between agents.
  - >
    What holds this together is a conviction that rigorous thinking and practical building are the same pursuit. The mathematical precision I learned early on now shows up in how I architect agentic systems with tools like LangGraph — where adversarial dynamics and multi-agent coordination aren't theoretical curiosities but engineering problems with real constraints. I'm drawn to the intersection of software engineering, RL, and multi-agent AI because that's where the hard questions about intelligence meet the discipline of making something actually work.
