# --- Academic research (from Georgia Tech) ---
research:
  - name: "MADDPG — Cooperative Multi-Agent RL under Google Research Football"
    category: reinforcement-learning
    technologies: [Python, TensorFlow]
    period: Mar 2022 - Apr 2022
    description: >
      Implemented MADDPG, a SOTA cooperative multi-agent actor-critic algorithm,
      under the Google Research Football MARL benchmark environment. Achieved a
      20-fold increase in pass success rate, surpassing the win rate of
      non-cooperative baselines with less than 20% of their average training time.

  - name: "Adversarial NLI Filtering — AFLite on Facebook's ANLI Dataset"
    category: nlp
    technologies: [Python, PyTorch, HuggingFace]
    period: Jan 2022 - present
    status: "Manuscript pending conference submission"
    description: >
      Used adversarial data filtering (AFLite) to remove spurious correlations
      in Facebook's ANLI dataset, improving accuracy compared to random
      subsampling before fitting a pre-trained RoBERTa-large model. Achieved
      competitive classification accuracy after discarding 2/3 of the dataset.
