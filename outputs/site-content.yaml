about:
  - >
    I build intelligent systems and study how they learn. My work sits at the intersection of software engineering, reinforcement learning, and multi-agent AI — a path that started with electrical engineering and actuarial mathematics, moved through machine learning research at Georgia Tech, and now focuses on designing agentic AI solutions. Nine years of production systems across fintech, insurance, and hardware taught me that rigorous thinking and practical building are the same pursuit.
  - >
    What draws me deeper is adversarial insight — how competing pressures between agents sharpen intelligence. Multi-agent systems reveal something fundamental about learning itself: that capability emerges not from isolated optimization but from interaction, conflict, and adaptation. I work on these problems through Zealot Analytics, where the research meets practice, and I keep returning to the question underneath all of it — what it actually means for a system, artificial or otherwise, to learn.
